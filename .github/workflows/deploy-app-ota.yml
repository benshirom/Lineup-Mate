name: Deploy App Update (Self-Hosted OTA)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy-ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: ver
        run: |
          V=$(node -p "require('./package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying app version $V"

      - name: Skip if version already deployed
        id: check
        run: |
          COUNT=$(curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/app_versions?version=eq.${{ steps.ver.outputs.version }}&select=id" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            | node -p "JSON.parse(require('fs').readFileSync(0)).length") \
            || { echo "::error::Failed querying app_versions — check SUPABASE_URL / SERVICE_ROLE_KEY secrets"; exit 1; }
          echo "exists=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" != "0" ]; then
            echo "::notice::Version ${{ steps.ver.outputs.version }} already deployed — nothing to do (bump with 'npm version patch')"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == '0'
        run: npm ci --legacy-peer-deps

      - name: Build static export
        if: steps.check.outputs.exists == '0'
        run: npm run build
        env:
          NEXT_EXPORT: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}

      - name: Sanity check build output
        if: steps.check.outputs.exists == '0'
        run: |
          test -f out/index.html || { echo "::error::out/index.html missing — static export failed or output dir changed"; exit 1; }
          echo "Build size: $(du -sh out | cut -f1)"

      - name: Secrets leak check
        if: steps.check.outputs.exists == '0'
        run: |
          if grep -rq "service_role" out/; then
            echo "::error::Possible service_role key inside the public bundle! Aborting."
            exit 1
          fi

      - name: Create bundle zip + checksum
        if: steps.check.outputs.exists == '0'
        id: zip
        run: |
          cd out && zip -qr ../bundle.zip . && cd ..
          SUM=$(sha256sum bundle.zip | cut -d' ' -f1)
          echo "checksum=$SUM" >> "$GITHUB_OUTPUT"
          echo "::notice::bundle.zip $(du -h bundle.zip | cut -f1), sha256=$SUM"

      - name: Upload bundle to Supabase Storage
        if: steps.check.outputs.exists == '0'
        run: |
          curl --fail-with-body -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/app-bundles/bundle-${{ steps.ver.outputs.version }}.zip" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/zip" \
            --data-binary @bundle.zip \
            || { echo "::error::Storage upload failed — check bucket 'app-bundles' exists and key is valid"; exit 1; }

      - name: Register new version
        if: steps.check.outputs.exists == '0'
        run: |
          curl --fail-with-body -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/app_versions" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"version":"${{ steps.ver.outputs.version }}","bundle_path":"bundle-${{ steps.ver.outputs.version }}.zip","checksum":"${{ steps.zip.outputs.checksum }}","active":true}' \
            || { echo "::error::Version registration failed — bundle uploaded but NOT live. Re-run job or insert row manually."; exit 1; }

      - name: Smoke test update endpoint
        if: steps.check.outputs.exists == '0'
        run: |
          RESP=$(curl -sf -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/app-update" \
            -H "Content-Type: application/json" -d '{"version_name":"0.0.0"}')
          echo "endpoint response: $RESP"
          echo "$RESP" | grep -q '"version":"${{ steps.ver.outputs.version }}"' \
            || { echo "::error::Endpoint did not serve the new version — check app-update function and app_versions table"; exit 1; }
          echo "::notice::✅ Version ${{ steps.ver.outputs.version }} is live"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 OTA deploy failed — v${{ steps.ver.outputs.version }}`,
              body: [
                `**Run:** ${runUrl}`,
                `**Commit:** ${context.sha}`,
                `**Branch:** main`,
                ``,
                `Open the run, find the red step — the ::error:: message explains the cause and fix.`,
                `Full troubleshooting table: LINEUP_MATE_OTA_PLAN_V2.md → Appendix A.`
              ].join('\n'),
              labels: ['ota-deploy-failure']
            });
